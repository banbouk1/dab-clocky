name: Deploy to Azure Container Registry and Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  IMAGE_NAME: '${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ vars.AZURE_CONTAINER_APP_NAME }}'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy code to the runner
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry (ACR)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }} , ${{ env.IMAGE_NAME }}:latest 